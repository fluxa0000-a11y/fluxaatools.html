<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxaa Aviator Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Plus+Jakarta+Sans:wght=600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0c10; color: #f3f4f6; }
        .digital-font { font-family: 'Orbitron', sans-serif; }
        .btn-cooldown { background: #1c1917 !important; color: #78716c !important; border-color: #44403c !important; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        @keyframes radar-pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        .radar-glow { animation: radar-pulse 3s infinite ease-in-out; }
    </style>
</head>
<body class="min-h-screen max-w-md mx-auto shadow-2xl border-x border-white/5 flex flex-col justify-between relative">

    <!-- ================= AUTH REGISTRATION MODAL ================= -->
    <div id="authModal" class="absolute inset-0 bg-black/95 backdrop-blur-xl z-[100] flex flex-col justify-center p-6 space-y-6">
        <div class="text-center space-y-1">
            <span class="text-[10px] text-red-500 font-extrabold tracking-widest block">FLUXAA NETWORKS</span>
            <h2 class="text-2xl font-black tracking-tight text-white">Create Gamer Profile</h2>
            <p class="text-xs text-zinc-400">Enter details to sync your real-time wallet</p>
        </div>

        <div class="bg-zinc-900/60 border border-white/5 p-5 rounded-3xl space-y-4 shadow-2xl">
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-zinc-400 block uppercase tracking-wider px-1">Full Name</label>
                <input type="text" id="regName" placeholder="Enter Name" class="w-full bg-zinc-950 border border-white/10 rounded-xl p-3.5 text-xs text-zinc-200 focus:outline-none focus:border-red-500 font-medium">
            </div>
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-zinc-400 block uppercase tracking-wider px-1">Gmail Address</label>
                <input type="email" id="regEmail" placeholder="yourname@gmail.com" class="w-full bg-zinc-950 border border-white/10 rounded-xl p-3.5 text-xs text-zinc-200 focus:outline-none focus:border-red-500 font-mono">
            </div>
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-zinc-400 block uppercase tracking-wider px-1">UPI ID (For Payouts)</label>
                <input type="text" id="regUpi" placeholder="username@paytm" class="w-full bg-zinc-950 border border-white/10 rounded-xl p-3.5 text-xs text-zinc-200 focus:outline-none focus:border-red-500 font-mono">
            </div>
            <button onclick="registerUserProfile()" class="w-full bg-gradient-to-r from-red-600 to-amber-600 text-white font-black text-xs uppercase tracking-widest py-4 rounded-xl shadow-xl transition-all mt-2">
                🚀 Initialize Account
            </button>
        </div>
    </div>

    <!-- FIXED TOP HEADER -->
    <header class="p-4 bg-black/60 backdrop-blur-md border-b border-white/5 flex justify-between items-center sticky top-0 z-50">
        <div>
            <span class="text-[9px] text-red-500 font-extrabold tracking-widest block">FLUXAA TECHNOLOGIES</span>
            <h1 id="pageTitle" class="text-sm font-black tracking-tight text-white uppercase">Aviator Game</h1>
        </div>
        <div class="bg-zinc-900 border border-white/10 px-3 py-1.5 rounded-xl flex items-center gap-1.5">
            <span class="text-xs text-amber-400">🪙</span>
            <span id="globalBalance" class="digital-font text-xs text-amber-400 font-bold">0</span>
            <span class="text-[9px] text-zinc-500 font-bold">FC</span>
        </div>
    </header>

    <!-- ================= PAGES CONTAINER ================= -->
    <main class="p-4 flex-1 overflow-y-auto mb-16">

        <!-- PAGE 1: AVIATOR GAME PANEL -->
        <div id="gamePage" class="page-content active space-y-4">
            <div id="radarBox" class="w-full h-56 bg-gradient-to-b from-zinc-950 to-zinc-900 border border-white/5 rounded-3xl relative overflow-hidden flex flex-col items-center justify-center transition-all duration-300">
                <div class="text-center z-20 space-y-1">
                    <div id="planeIcon" class="text-3xl mb-2 transition-all duration-300 radar-glow">✈️</div>
                    <h2 id="multiplierDisplay" class="digital-font text-5xl font-black tracking-wider text-red-500 drop-shadow-[0_0_15px_rgba(239,68,68,0.3)]">1.00x</h2>
                    <p id="statusLabel" class="text-[10px] text-zinc-500 font-mono tracking-widest uppercase font-bold">Engine Ready</p>
                </div>
                <div class="absolute inset-0 bg-[linear-gradient(to_right,#ffffff03_1px,transparent_1px),linear-gradient(to_bottom,#ffffff03_1px,transparent_1px)] bg-[size:20px_20px] pointer-events-none"></div>
            </div>

            <div class="space-y-1.5">
                <span class="text-[9px] text-zinc-500 font-bold uppercase tracking-wider block px-1">Recent Crashes</span>
                <div id="historyStrip" class="flex gap-2 overflow-x-auto pb-1">
                    <span class="bg-red-500/10 border border-red-500/20 text-red-400 font-mono text-[10px] px-2.5 py-1 rounded-lg font-bold">1.35x</span>
                </div>
            </div>

            <div class="bg-zinc-900/50 border border-white/5 p-4 rounded-3xl space-y-4">
                <input type="number" id="betInput" value="10" min="1" class="w-full bg-zinc-950 border border-white/5 rounded-xl p-3 text-sm text-amber-400 font-mono font-bold text-center">
                <button id="actionBtn" onclick="handlePrimaryAction()" class="w-full bg-gradient-to-r from-red-600 to-amber-600 text-white font-black text-sm uppercase py-4 rounded-2xl shadow-xl">
                    🛫 Place Bet & Launch
                </button>
            </div>
        </div>

        <!-- PAGE 2: COIN STATION (MONETAG LIVE INJECTED) -->
        <div id="adsPage" class="page-content space-y-4">
            <div class="bg-gradient-to-r from-purple-950/20 to-zinc-900 border border-purple-500/20 p-5 rounded-3xl space-y-4">
                <div class="flex justify-between items-center">
                    <div>
                        <span class="text-[9px] bg-purple-500/20 text-purple-400 px-2 py-0.5 rounded-md font-bold uppercase tracking-wider">Daily Video Tasks</span>
                        <h3 class="text-xs font-bold text-zinc-300 mt-1">Watch Video Ad</h3>
                    </div>
                    <span id="adCounterDisplay" class="text-xs font-mono font-bold text-purple-400 bg-purple-500/10 px-2.5 py-1 rounded-lg">Ads: 0 / 8</span>
                </div>
                
                <!-- Main Action Trigger Button -->
                <button id="adBtn" onclick="watchVideoAd()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold text-xs py-3.5 rounded-xl transition-all shadow-lg flex justify-center items-center gap-2">
                    📺 Watch Vignette Ad (+10 FC)
                </button>
            </div>
        </div>

        <!-- PAGE 3: WALLET -->
        <div id="walletPage" class="page-content space-y-4">
            <div class="bg-gradient-to-br from-zinc-900 to-zinc-950 border border-white/5 p-5 rounded-3xl space-y-4">
                <div class="bg-black/50 border border-white/5 p-3 rounded-xl text-[11px] space-y-1 font-mono text-zinc-400">
                    <div><span class="text-zinc-500">Holder:</span> <span id="lblProfileName" class="text-zinc-200"></span></div>
                    <div><span class="text-zinc-500">Gmail:</span> <span id="lblProfileEmail" class="text-zinc-200"></span></div>
                    <div><span class="text-zinc-500">UPI Destination:</span> <span id="lblProfileUpi" class="text-emerald-400"></span></div>
                </div>
                <button onclick="triggerWithdrawal()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-bold text-xs py-3.5 rounded-xl shadow-lg">
                    💰 Request Instant UPI Payout
                </button>
            </div>
        </div>

    </main>

    <!-- FIXED BOTTOM NAV BAR -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-black/80 backdrop-blur-lg border-t border-white/5 grid grid-cols-3 p-2 z-50">
        <button onclick="switchTab('game', this)" class="nav-tab flex flex-col items-center justify-center py-1.5 text-amber-500 font-bold">🚀 <span class="text-[10px]">Aviator</span></button>
        <button onclick="switchTab('ads', this)" class="nav-tab flex flex-col items-center justify-center py-1.5 text-zinc-500 font-medium">📺 <span class="text-[10px]">Earn Coins</span></button>
        <button onclick="switchTab('wallet', this)" class="nav-tab flex flex-col items-center justify-center py-1.5 text-zinc-500 font-medium">💼 <span class="text-[10px]">Wallet</span></button>
    </nav>

    <!-- ================= CORE MECHANICS ENGINE ================= -->
    <script>
        const GOOGLE_SCRIPT_URL = ""; // Paste Google Web App link here
        let userProfile = { name: "", email: "", upi: "" };
        let gameState = {
            balance: 100, betAmount: 10, multiplier: 1.00, status: 'IDLE', gameInterval: null, timeElapsed: 0,
            isWatchingAd: false, adsViewedToday: 0, maxAdsPerDay: 8, dailyWithdrawnToday: 0, maxDailyLimitINR: 10
        };

        function registerUserProfile() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const upi = document.getElementById('regUpi').value.trim();
            if (!name || !email || !upi) { alert("⚠️ Saari details bharo bhai!"); return; }
            userProfile = { name, email, upi };
            document.getElementById('lblProfileName').innerText = name;
            document.getElementById('lblProfileEmail').innerText = email;
            document.getElementById('lblProfileUpi').innerText = upi;
            document.getElementById('authModal').style.display = 'none';
            sendDataToGoogleSheet("ACCOUNT_SIGNUP");
            updateWalletUI();
        }

        // 🛑 MONETAG VIGNETTE INJECTION PROTOCOL
        function watchVideoAd() {
            if (gameState.isWatchingAd || gameState.adsViewedToday >= gameState.maxAdsPerDay) return;
            gameState.isWatchingAd = true;

            const adBtn = document.getElementById('adBtn');
            adBtn.disabled = true;
            adBtn.innerText = "⏳ Loading Monetag Vignette Ad...";

            // 🛠️ Tumhara code yahan dynamic load hoga aur user ki screen par popup dikhayega
            try {
                (function(s){
                    s.dataset.zone='11130226';
                    s.src='https://n6wxm.com/vignette.min.js';
                })([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
            } catch (e) {
                console.log("Ad Blocked or Loading Error", e);
            }

            // 3 Second ka hold timer taaki user ad dekh sake aur bypass na ho
            let timeLeft = 3;
            const timer = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    adBtn.innerText = `📺 Processing Reward... (${timeLeft}s)`;
                } else {
                    clearInterval(timer);
                    gameState.adsViewedToday++;
                    gameState.balance += 10; // Success reward +10 coins
                    updateWalletUI();
                    gameState.isWatchingAd = false;
                    
                    sendDataToGoogleSheet("WATCH_AD"); // Database lock update
                    triggerAdCooldown(10); // 10 Second safe cooldown lock
                }
            }, 1000);
        }

        function triggerAdCooldown(seconds) {
            const adBtn = document.getElementById('adBtn');
            let cooldownLeft = seconds;
            adBtn.disabled = true;
            adBtn.className = "w-full bg-zinc-800 text-zinc-500 font-mono text-xs py-3.5 rounded-xl text-center border border-zinc-700 btn-cooldown";
            
            const cooldownInterval = setInterval(() => {
                cooldownLeft--;
                if (cooldownLeft > 0) {
                    adBtn.innerText = `🔒 Next Ad lock: Wait ${cooldownLeft}s`;
                } else {
                    clearInterval(cooldownInterval);
                    if (gameState.adsViewedToday < gameState.maxAdsPerDay) {
                        adBtn.disabled = false;
                        adBtn.className = "w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold text-xs py-3.5 rounded-xl text-center shadow-lg";
                        adBtn.innerText = "📺 Watch Vignette Ad (+10 FC)";
                    }
                }
            }, 1000);
        }

        function sendDataToGoogleSheet(actionType, withdrawAmt = 0) {
            if (!GOOGLE_SCRIPT_URL) return;
            const payload = {
                name: userProfile.name, email: userProfile.email, upi: userProfile.upi,
                coins: Math.round(gameState.balance), adsWatched: gameState.adsViewedToday,
                withdrawAmount: withdrawAmt, action: actionType, timestamp: new Date().toISOString()
            };
            fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        }

        function switchTab(pageId, buttonElement) {
            if (gameState.status === 'FLYING') return;
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(btn => btn.className = "nav-tab flex flex-col items-center justify-center py-1.5 text-zinc-500 font-medium");
            document.getElementById(pageId + 'Page').classList.add('active');
            buttonElement.className = "nav-tab flex flex-col items-center justify-center py-1.5 text-amber-500 font-bold";
        }

        function updateWalletUI() {
            document.getElementById('globalBalance').innerText = Math.round(gameState.balance);
            document.getElementById('adCounterDisplay').innerText = `Ads: ${gameState.adsViewedToday} / ${gameState.maxAdsPerDay}`;
            if (gameState.adsViewedToday >= gameState.maxAdsPerDay) {
                const adBtn = document.getElementById('adBtn'); adBtn.disabled = true;
                adBtn.className = "w-full bg-red-950/40 text-red-400 text-xs py-3 rounded-xl text-center cursor-not-allowed border border-red-900/50";
                adBtn.innerText = "🛑 Daily Ad Limit Reached (8/8)";
            }
        }

        function handlePrimaryAction() { /* Game Loop Logic */ }
        function triggerWithdrawal() { /* Payout Logic */ }
    </script>
</body>
  </html>
