<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Scientific Calculator</title>
    <style>
        :root {
            --bg: #000000;          
            --card: #0a0e14;
            --blue: #00b7ff;
            --orange: #ff9800;
            --btn-dark: #1c1c1e;    
            --btn-light: #2c2c2e;
            --text-main: #ffffff;
            --text-dim: #7d7d82;    
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            padding-bottom: 90px;
        }

        /* SPLASH SCREEN */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            animation: fadeOut 0.5s ease forwards;
            animation-delay: 1.5s;
        }

        .splash-content {
            text-align: center;
        }

        .css-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--btn-light), #000);
            border-radius: 24px;
            margin: 0 auto 20px;
            border: 2px solid var(--orange);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            color: var(--orange);
            box-shadow: 0 0 25px rgba(255, 152, 0, 0.3);
        }

        #splash h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        #splash p {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        @keyframes fadeOut {
            to { opacity: 0; pointer-events: none; display: none; visibility: hidden; }
        }

        /* MAIN CALCULATOR CONTAINER */
        .container {
            width: 100%;
            max-width: 420px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        /* TOP MODE TABS */
        .mode {
            display: flex;
            justify-content: space-between;
            background: var(--btn-dark);
            padding: 5px;
            border-radius: 14px;
            margin-bottom: 25px;
        }

        .mode button {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.2s;
        }

        .mode button.active {
            background: var(--btn-light);
            color: #fff;
        }

        /* DUAL DISPLAY AREA */
        .display-box {
            padding: 10px 15px;
            text-align: right;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        #expression {
            font-size: 3.2rem;
            font-weight: 400;
            color: var(--text-main);
            word-wrap: break-word;
            word-break: break-all;
            white-space: pre-wrap;
            line-height: 1.2;
            margin-bottom: 5px;
        }

        #preview {
            font-size: 1.8rem;
            color: var(--text-dim);
            min-height: 35px;
            font-weight: 400;
        }

        /* PREMIUM BUTTONS GRID */
        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .buttons button {
            aspect-ratio: 1; 
            border: none;
            border-radius: 50%; 
            font-size: 1.4rem;
            font-weight: 500;
            color: white;
            background: var(--btn-dark);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
        }

        .buttons button:active {
            transform: scale(0.92);
            filter: brightness(1.4);
        }

        .buttons button.operator {
            background: var(--btn-light);
            color: var(--orange); 
            font-size: 1.6rem;
        }

        .buttons button.equal {
            background: var(--orange);
            color: white;
            font-size: 1.6rem;
        }

        .buttons button.clear {
            color: #ff453a;
        }

        /* Hidden scientific buttons toggles */
        .buttons button.sci-btn {
            display: none;
            background: #121214;
            font-size: 1.1rem;
            color: #00b7ff;
        }

        /* GRAPH PANEL CANVAS LAYOUT */
        #graphPanel {
            display: none;
            background: #11151c;
            border: 1px solid var(--btn-dark);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        #graphPanel h3 { font-size: 1rem; color: var(--blue); margin-bottom: 8px; font-weight: 500; }
        #graphCanvas { background: #ffffff; border-radius: 8px; width: 100%; height: 180px; display: block; }

        /* HISTORY LAYOUT */
        .history {
            margin-top: 25px;
            border-top: 1px solid var(--btn-dark);
            padding-top: 15px;
        }

        .history-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .history-top h2 { font-size: 1rem; color: var(--text-dim); }

        .delete-btn {
            background: transparent !important;
            color: #ff453a !important;
            border: none !important;
            font-size: 0.85rem !important;
            cursor: pointer;
        }

        #historyList {
            max-height: 120px;
            overflow-y: auto;
        }

        .history-item {
            padding: 8px 0;
            border-bottom: 1px solid #111;
            text-align: right;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .hist-expr { color: var(--text-dim); font-size: 0.85rem; }
        .hist-res { color: var(--orange); font-weight: 600; font-size: 1rem; }


        @media(max-width: 400px){
            .buttons { gap: 8px; }
            .buttons button { font-size: 1.2rem; }
            #expression { font-size: 2.6rem; }
        }
        body {
    background: var(--bg);
    color: var(--text-main);
    display: flex;
    flex-direction: column; /* 👈 Yeh footer ko sahi se set karega */
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
    padding-bottom: 40px; /* 👈 Footer ke liye space */
}
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-content">
            <div class="css-logo">√π</div>
            <h1>Pocket Calculator</h1>
            <p>Powered by Fluxaa</p>
        </div>
    </div>

    <div class="container">
        
        <div class="mode">
            <button id="btn-norm" class="active" onclick="changeMode('normal')">NORMAL</button>
            <button id="btn-sci" onclick="changeMode('scientific')">SCIENTIFIC</button>
            <button id="btn-graph" onclick="changeMode('graph')">GRAPH</button>
        </div>

        <div id="graphPanel">
            <h3>Live Equation Graph Visualizer</h3>
            <canvas id="graphCanvas" width="380" height="180"></canvas>
        </div>

        <div class="display-box">
            <div id="expression">0</div>
            <div id="preview"></div>
        </div>

        <div class="buttons">
            <button onclick="inputDigit('7')">7</button>
            <button onclick="inputDigit('8')">8</button>
            <button onclick="inputDigit('9')">9</button>
            <button class="operator" onclick="inputOperator('/')">÷</button>
            <button class="operator sci-match" onclick="inputDigit('π')">π</button>

            <button onclick="inputDigit('4')">4</button>
            <button onclick="inputDigit('5')">5</button>
            <button onclick="inputDigit('6')">6</button>
            <button class="operator" onclick="inputOperator('*')">×</button>
            <button class="operator sci-match" onclick="inputDigit('e')">e</button>

            <button onclick="inputDigit('1')">1</button>
            <button onclick="inputDigit('2')">2</button>
            <button onclick="inputDigit('3')">3</button>
            <button class="operator" onclick="inputOperator('-')">−</button>
            <button class="operator sci-match" onclick="runFunc('sin')">sin</button>

            <button onclick="inputDigit('0')">0</button>
            <button onclick="inputDigit('.')">.</button>
            <button class="operator" onclick="inputOperator('+')">+</button>
            <button class="equal" onclick="calculate()">=</button>
            <button class="operator sci-match" onclick="runFunc('cos')">cos</button>

            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="inputDigit('(')">(</button>
            <button onclick="inputDigit(')')">)</button>
            <button class="operator" onclick="runFunc('sqrt')">√</button>
            <button class="operator sci-match" onclick="runFunc('tan')">tan</button>

            <button class="sci-btn" onclick="inputOperator('**2')">x²</button>
            <button class="sci-btn" onclick="inputOperator('**3')">x³</button>
            <button class="sci-btn" onclick="runFunc('log')">log</button>
            <button class="sci-btn" onclick="runFunc('ln')">ln</button>
            <button class="sci-btn" onclick="runSpecial('factorial')">n!</button>

            <button class="sci-btn" onclick="runSpecial('inverse')">INV</button>
            <button class="sci-btn" onclick="alert('Hyperbolic activated')">hyp</button>
            <button class="sci-btn" onclick="inputOperator('-')">(-)</button>
            <button class="sci-btn" onclick="loadMemory()">RCL</button>
            <button class="sci-btn" onclick="inputDigit('x')">x</button>

            <button class="sci-btn" onclick="inputOperator('%')">%</button>
            <button class="sci-btn" onclick="inputOperator('^')">^</button>
            <button class="sci-btn" onclick="inputOperator('*10**')">EXP</button>
            <button class="sci-btn" onclick="runFunc('abs')">abs</button>
            <button class="sci-btn" onclick="runSpecial('rand')">Rand</button>

            <button class="sci-btn" onclick="runFunc('sinh')">sinh</button>
            <button class="sci-btn" onclick="runFunc('cosh')">cosh</button>
            <button class="sci-btn" onclick="runFunc('tanh')">tanh</button>
            <button class="sci-btn" onclick="runFunc('asin')">asin</button>
            <button class="sci-btn" onclick="runFunc('acos')">acos</button>

            <button class="sci-btn" onclick="runFunc('atan')">atan</button>
            <button class="sci-btn" onclick="runFunc('pow10')">10^x</button>
            <button class="sci-btn" onclick="runFunc('expex')">e^x</button>
            <button class="sci-btn" onclick="runFunc('cbrt')">3√x</button>
            <button class="sci-btn" onclick="runFunc('floor')">INT</button>
        </div>

        <div class="history">
            <div class="history-top">
                <h2>History</h2>
                <button class="delete-btn" onclick="clearHistory()">Clear All</button>
            </div>
            <div id="historyList"></div>
        </div>
    </div>
<!-- PRODUCT FOOTER WITH HIGHLIGHTED LINK -->
<footer style="margin-top: 40px; padding: 20px 15px; text-align: center; background: #020617; border-top: 1px solid rgba(255,255,255,0.08); border-radius: 16px; width: 100%; max-width: 420px; box-sizing: border-box;">
    
    <!-- Information Link -->
    <p style="color: #94a3b8; font-family: 'Poppins', sans-serif; font-size: 14px; margin-bottom: 12px; letter-spacing: 0.5px; line-height: 1.5;">
        For More Information About Fluxaa 
        <a href="https://fluxaaofficial.vercel.app" target="_blank" style="color: #00d9ff; font-weight: 600; text-decoration: none; border-bottom: 1px dashed #00d9ff; padding-bottom: 2px; display: inline-block; white-space: nowrap; transition: 0.3s;" onmouseover="this.style.color='white'; this.style.borderColor='white'; this.style.textShadow='0 0 10px rgba(0, 217, 255, 0.6)';" onmouseout="this.style.color='#00d9ff'; this.style.borderColor='#00d9ff'; this.style.textShadow='none';">
            Click Here 🚀
        </a>
    </p>

    <!-- Copyright -->
    <p style="color: #64748b; font-family: 'Poppins', sans-serif; font-size: 13px; letter-spacing: 0.5px;">
        © 2026 <span style="color: #cbd5e1; font-weight: 500;">Fluxaa Technologies</span>. All rights reserved.
    </p>

</footer>

    <script>
        const exprDiv = document.getElementById("expression");
        const previewDiv = document.getElementById("preview");
        const historyList = document.getElementById("historyList");
        let memoryValue = 0;
        let currentMode = 'normal';

        exprDiv.innerText = "0";

        function inputDigit(val) {
            if (exprDiv.innerText === "0" && val !== '.') {
                exprDiv.innerText = val;
            } else {
                exprDiv.innerText += val;
            }
            updateLivePreview();
        }

        function inputOperator(op) {
            let current = exprDiv.innerText;
            let lastChar = current.slice(-1);
            if(["+", "-", "*", "/", "%", "^"].includes(lastChar)) {
                exprDiv.innerText = current.slice(0, -1) + op;
            } else {
                if(exprDiv.innerText === "0" && op === "-") {
                    exprDiv.innerText = op;
                } else {
                    exprDiv.innerText += op;
                }
            }
            updateLivePreview();
        }

        function runFunc(type) {
            let current = exprDiv.innerText;
            if(current === "0" || current === "") {
                exprDiv.innerText = type + "(";
            } else {
                let lastChar = current.slice(-1);
                if(["+", "-", "*", "/", "(", "%", "^"].includes(lastChar)) {
                    exprDiv.innerText += type + "(";
                } else {
                    exprDiv.innerText += "*" + type + "(";
                }
            }
            updateLivePreview();
        }

        function runSpecial(action) {
            if(action === 'inverse') {
                exprDiv.innerText = "1/(" + exprDiv.innerText + ")";
            } else if(action === 'rand') {
                inputDigit(Math.random().toFixed(4));
            } else if(action === 'factorial') {
                exprDiv.innerText += "!";
            }
            updateLivePreview();
        }

        function loadMemory() {
            if(exprDiv.innerText === "0") exprDiv.innerText = memoryValue;
            else exprDiv.innerText += memoryValue;
            updateLivePreview();
        }

        function clearDisplay() {
            exprDiv.innerText = "0";
            previewDiv.innerText = "";
            if(currentMode === 'graph') { drawLiveGraph("0"); }
        }

        function cleanAndParse(str, isForGraph = false) {
            let parsed = str.replace(/÷/g, "/").replace(/×/g, "*").replace(/−/g, "-");
            parsed = parsed.replace(/π/g, "Math.PI").replace(/e/g, "Math.E");
            
            let ob = (parsed.match(/\(/g) || []).length;
            let cb = (parsed.match(/\)/g) || []).length;
            while(ob > cb) { parsed += ")"; cb++; }

            if(parsed.includes("!")) {
                parsed = parsed.replace(/(\d+)!/g, function(match, num) {
                    let f = 1; for(let i=1; i<=parseInt(num); i++) f *= i; return f;
                });
            }

            if(isForGraph) {
                parsed = parsed.replace(/sin\(/g, "Math.sin(");
                parsed = parsed.replace(/cos\(/g, "Math.cos(");
                parsed = parsed.replace(/tan\(/g, "Math.tan(");
            } else {
                parsed = parsed.replace(/sin\(/g, "Math.sin(" + Math.PI + "/180*");
                parsed = parsed.replace(/cos\(/g, "Math.cos(" + Math.PI + "/180*");
                parsed = parsed.replace(/tan\(/g, "Math.tan(" + Math.PI + "/180*");
            }
            
            parsed = parsed.replace(/sinh\(/g, "Math.sinh(");
            parsed = parsed.replace(/cosh\(/g, "Math.cosh(");
            parsed = parsed.replace(/tanh\(/g, "Math.tanh(");
            parsed = parsed.replace(/asin\(/g, "Math.asin(");
            parsed = parsed.replace(/acos\(/g, "Math.acos(");
            parsed = parsed.replace(/atan\(/g, "Math.atan(");

            parsed = parsed.replace(/log\(/g, "Math.log10(");
            parsed = parsed.replace(/ln\(/g, "Math.log(");
            parsed = parsed.replace(/sqrt\(/g, "Math.sqrt(");
            parsed = parsed.replace(/cbrt\(/g, "Math.cbrt(");
            parsed = parsed.replace(/abs\(/g, "Math.abs(");
            parsed = parsed.replace(/floor\(/g, "Math.floor(");
            parsed = parsed.replace(/pow10\(/g, "Math.pow(10,");
            parsed = parsed.replace(/expex\(/g, "Math.exp(");

            if(parsed.includes("^")) {
                let parts = parsed.split("^");
                parsed = `Math.pow(${parts[0]},${parts[1]})`;
            }
            return parsed;
        }

        function updateLivePreview() {
            try {
                let currentExpr = exprDiv.innerText;
                
                if(currentExpr.includes('x')) {
                    if(currentMode === 'graph') { drawLiveGraph(currentExpr); }
                    previewDiv.innerText = "Graph Mode";
                    return;
                }

                if (!currentExpr || currentExpr === "0" || currentExpr.endsWith("(")) {
                    previewDiv.innerText = "";
                    return;
                }

                let finalString = cleanAndParse(currentExpr, false);
                let evaluation = eval(finalString);
                if (evaluation !== undefined && !isNaN(evaluation)) {
                    previewDiv.innerText = Number.isInteger(evaluation) ? evaluation : parseFloat(evaluation.toFixed(6));
                } else {
                    previewDiv.innerText = "";
                }
            } catch (e) {
                previewDiv.innerText = "";
            }
        }

        function calculate() {
            try {
                let currentExpr = exprDiv.innerText;
                if(!currentExpr || currentExpr === "0") return;

                if(currentExpr.includes('x')) {
                    if(currentMode === 'graph') { drawLiveGraph(currentExpr); }
                    return;
                }
                
                let finalString = cleanAndParse(currentExpr, false);
                let finalOutput = eval(finalString);
                
                if(finalOutput === undefined || isNaN(finalOutput)) throw new Error();
                finalOutput = Number.isInteger(finalOutput) ? finalOutput : parseFloat(finalOutput.toFixed(8));

                memoryValue = finalOutput;

                saveHistory({ expr: currentExpr, res: "= " + finalOutput });
                exprDiv.innerText = finalOutput;
                previewDiv.innerText = "";
            } catch (e) {
                exprDiv.innerText = "Error";
                previewDiv.innerText = "";
                setTimeout(() => { exprDiv.innerText = "0"; }, 1500);
            }
        }

        function drawLiveGraph(equation) {
            const canvas = document.getElementById("graphCanvas");
            const ctx = canvas.getContext("2d");
            if(!canvas) return;
            
            let width = canvas.width;
            let height = canvas.height;
            
            ctx.clearRect(0, 0, width, height);

            ctx.strokeStyle = "#d1d1d6"; 
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, height / 2); ctx.lineTo(width, height / 2); 
            ctx.moveTo(width / 2, 0); ctx.lineTo(width / 2, height); 
            ctx.stroke();

            if(!equation || equation === "0") return;

            ctx.strokeStyle = "#00b7ff"; 
            ctx.lineWidth = 3;
            ctx.beginPath();
            
            let initial = true;
            let scale = 25; 

            for(let pX = 0; pX < width; pX++) {
                let x = (pX - width / 2) / scale;
                try {
                    let mathSafeEq = equation.replace(/x/g, `(${x})`);
                    let evalReady = cleanAndParse(mathSafeEq, true);
                    let y = eval(evalReady);
                    
                    let pY = (height / 2) - (y * scale);

                    if(!isNaN(pY) && isFinite(pY)) {
                        if(initial) { 
                            ctx.moveTo(pX, pY); 
                            initial = false; 
                        } else { 
                            ctx.lineTo(pX, pY); 
                        }
                    }
                } catch(e){}
            }
            ctx.stroke();
        }

        function saveHistory(item) {
            let history = JSON.parse(localStorage.getItem("fluxaaCalcHistory")) || [];
            history.unshift(item);
            localStorage.setItem("fluxaaCalcHistory", JSON.stringify(history.slice(0, 15)));
            loadHistory();
        }

        function loadHistory() {
            let history = JSON.parse(localStorage.getItem("fluxaaCalcHistory")) || [];
            historyList.innerHTML = "";
            history.forEach(entry => {
                let div = document.createElement("div");
                div.className = "history-item";
                div.innerHTML = `<span class="hist-expr">${entry.expr}</span><span class="hist-res">${entry.res}</span>`;
                
                div.onclick = () => {
                    exprDiv.innerText = entry.expr;
                    updateLivePreview();
                };
                historyList.appendChild(div);
            });
        }

        function clearHistory() {
            localStorage.removeItem("fluxaaCalcHistory");
            loadHistory();
        }

        function changeMode(mode) {
            currentMode = mode;
            document.querySelectorAll(".mode button").forEach(b => b.classList.remove("active"));
            
            if(mode === 'normal') document.getElementById("btn-norm").classList.add("active");
            if(mode === 'scientific') document.getElementById("btn-sci").classList.add("active");
            if(mode === 'graph') document.getElementById("btn-graph").classList.add("active");

            const sciButtons = document.querySelectorAll(".sci-btn");
            const sciMatches = document.querySelectorAll(".sci-match");
            const graphPanel = document.getElementById("graphPanel");

            if (mode === 'normal') {
                sciButtons.forEach(btn => btn.style.display = "none");
                sciMatches.forEach(btn => btn.style.display = "flex");
                graphPanel.style.display = "none";
            } else if (mode === 'graph') {
                sciButtons.forEach(btn => btn.style.display = "flex");
                sciMatches.forEach(btn => btn.style.display = "flex");
                graphPanel.style.display = "block";
                drawLiveGraph(exprDiv.innerText);
            } else {
                sciButtons.forEach(btn => btn.style.display = "flex");
                sciMatches.forEach(btn => btn.style.display = "flex");
                graphPanel.style.display = "none";
            }
            updateLivePreview();
        }

        loadHistory();
        
</script>
</body>
</html>
